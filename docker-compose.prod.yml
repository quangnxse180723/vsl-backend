# ============================================================================
#  Docker Compose PRODUCTION: dung image da build san tu GHCR (khong build local).
#  Chi Caddy (80/443) expose ra internet, tu dong xin/gia han HTTPS qua
#  Let's Encrypt (xem Caddyfile). App (8080) va MinIO (9000) khong publish
#  port ra host nua - Caddy reverse-proxy toi chung qua Docker network noi bo.
#  Postgres va MinIO console van KHONG expose ra ngoai - chi qua SSH tunnel.
# ============================================================================
services:
  postgres:
    image: postgres:17-alpine
    container_name: vsl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - vsl-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - vsl-net

  minio:
    image: minio/minio:latest
    container_name: vsl-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - vsl-net

  app:
    image: ghcr.io/quangnxse180723/vsl-backend:latest
    container_name: vsl-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION}
      SERVER_PORT: 8080
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      AI_MODEL_PATH: /app/models/mvitv2_small.onnx
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_ENABLED: ${GEMINI_ENABLED:-false}
    volumes:
      - ./models:/app/models:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 -O /dev/null http://localhost:8080/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 240s
    networks:
      - vsl-net

  caddy:
    image: caddy:2-alpine
    container_name: vsl-caddy
    restart: unless-stopped
    depends_on:
      - app
      - minio
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - vsl-net

volumes:
  vsl-pgdata:
  minio_data:
  caddy_data:
  caddy_config:

networks:
  vsl-net:
    driver: bridge
