# ============================================================================
#  Docker Compose: PostgreSQL + Spring Boot backend
#  Cac bien ${...} duoc Compose tu dong doc tu file .env cung thu muc.
# ============================================================================
services:
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: vsl-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5555:80"
    networks:
      - vsl-net
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    container_name: vsl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - vsl-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - vsl-net

  minio:
    image: minio/minio:latest
    container_name: vsl-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - vsl-net

  app:
    build: .
    container_name: vsl-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      # Ben trong mang Docker, host cua DB la ten service "postgres"
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION}
      SERVER_PORT: 8080
      # MinIO: backend dung internal Docker hostname
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-http://localhost:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      # AI Model: mount volume chua file .onnx
      AI_MODEL_PATH: /app/models/mvitv2_small.onnx
      # Gemini kiem duyet blog - key lay tu file .env (khong commit)
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      # Mail config cho chuc nang quen mat khau
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    volumes:
      - ./models:/app/models:ro
    ports:
      - "${SERVER_PORT:-8080}:8080"
    healthcheck:
      # Khong dung "--spider": busybox wget xu ly sai response chunked (khong co
      # Content-Length) cua /api/health, bao loi "Auth Failed" gia du API tra 200 that.
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 -O /dev/null http://localhost:8080/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      # App mat toi ~3.5 phut de khoi dong (load model ONNX), start_period ngan hon
      # se khien vai lan check dau bi tinh la fail that su -> container bao unhealthy.
      start_period: 240s
    networks:
      - vsl-net

volumes:
  vsl-pgdata:
  minio_data:

networks:
  vsl-net:
    driver: bridge


