# Cau hinh rieng cho test: dung H2 in-memory (che do PostgreSQL), khong phu thuoc DB that / .env
spring.datasource.url=jdbc:h2:mem:vsl_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT cho moi truong test (gia tri co dinh, khong nhay cam)
application.security.jwt.secret-key=dGVzdC1zZWNyZXQta2V5LWZvci12c2wtYmFja2VuZC1pbnRlZ3JhdGlvbi10ZXN0LW9ubHktMTIzNDU2Nzg5MA==
application.security.jwt.access-token-expiration=900000
application.security.jwt.refresh-token-expiration=604800000

# MinIO: file test nay THAY THE hoan toan application.properties chinh (khong
# ke thua default cua no), nen phai khai bao lai day du o day. Gia tri chi la
# placeholder - MinioClient.builder() khong ket noi mang luc tao bean, va
# MinioService.@PostConstruct tu bat loi ket noi (log warn) chu khong nem
# exception, nen khong can MinIO that dang chay de test pass.
minio.endpoint=http://localhost:9000
minio.public-endpoint=http://localhost:9000
minio.access-key=test
minio.secret-key=test
minio.bucket.tutorials=tutorial-videos
minio.bucket.vocabulary-images=vocabulary-images
minio.bucket.category-images=category-images
minio.bucket.avatars=avatars
minio.bucket.blog-thumbnails=blog-thumbnails
