spring.application.name=vsl-backend

# ===================== Datasource (PostgreSQL) =====================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================== JPA / Hibernate =====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===================== Security / JWT =====================
application.security.jwt.secret-key=${JWT_SECRET}
application.security.jwt.access-token-expiration=${JWT_ACCESS_EXPIRATION}
application.security.jwt.refresh-token-expiration=${JWT_REFRESH_EXPIRATION}

# ===================== Server =====================
server.port=${SERVER_PORT:8080}

# Không lộ thông tin nội bộ ra response lỗi mặc định của Spring
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never
