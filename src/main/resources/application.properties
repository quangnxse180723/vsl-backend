spring.application.name=vsl-backend

# ===================== Datasource (PostgreSQL) =====================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================== JPA / Hibernate =====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===================== Security / JWT =====================
application.security.jwt.secret-key=${JWT_SECRET}
application.security.jwt.access-token-expiration=${JWT_ACCESS_EXPIRATION}
application.security.jwt.refresh-token-expiration=${JWT_REFRESH_EXPIRATION}

# ===================== Server =====================
server.port=${SERVER_PORT:8080}

# Timeout cho request async (controller tra CompletableFuture). Mac dinh 30s qua ngan
# cho AI inference (cat frame + ONNX). Tang len 120s.
spring.mvc.async.request-timeout=120000

# Không lộ thông tin nội bộ ra response lỗi mặc định của Spring
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never

# ===================== Multipart (Video Upload) =====================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=110MB

# ===================== MinIO =====================
minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.public-endpoint=${MINIO_PUBLIC_ENDPOINT:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
minio.bucket.tutorials=tutorial-videos
minio.bucket.vocabulary-images=vocabulary-images
minio.bucket.category-images=category-images
minio.bucket-name=avatars

# ===================== AI Model =====================
ai.model.path=${AI_MODEL_PATH:./models/mvitv2_small.onnx}
